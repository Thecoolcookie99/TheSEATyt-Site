<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>B2 File Manager</title>
</head>
<body>
  <h2>Backblaze B2 File Manager</h2>

  <div id="login">
    <p>Enter password to unlock API key:</p>
    <input type="password" id="password" />
    <button onclick="unlock()">Unlock</button>
  </div>

  <div id="app" style="display:none;">
    <h3>Upload File</h3>
    <input type="file" id="fileInput" />
    <button onclick="uploadFile()">Upload</button>

    <h3>Files</h3>
    <button onclick="listFiles()">Refresh</button>
    <ul id="fileList"></ul>
  </div>

<script>
// ===============================
// ENCRYPTED CONFIG PLACEHOLDER
// ===============================

// Replace these with your own encrypted values
const CONFIG = {
  keyIdEnc: "REPLACE_ME",
  appKeyEnc: "REPLACE_ME",
  salt: "REPLACE_ME_BASE64",
  iv: "REPLACE_ME_BASE64"
};

// ===============================
// CRYPTO HELPERS
// ===============================
async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey(
    "raw",
    enc.encode(password),
    "PBKDF2",
    false,
    ["deriveKey"]
  );

  return crypto.subtle.deriveKey(
    {
      name: "PBKDF2",
      salt: salt,
      iterations: 100000,
      hash: "SHA-256"
    },
    baseKey,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

async function decryptData(password, dataB64, saltB64, ivB64) {
  const salt = Uint8Array.from(atob(saltB64), c => c.charCodeAt(0));
  const iv = Uint8Array.from(atob(ivB64), c => c.charCodeAt(0));
  const key = await deriveKey(password, salt);

  const data = Uint8Array.from(atob(dataB64), c => c.charCodeAt(0));

  const decrypted = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv },
    key,
    data
  );

  return new TextDecoder().decode(decrypted);
}

// ===============================
// BACKBLAZE STATE
// ===============================
let authToken = null;
let apiUrl = null;
let bucketId = null;

// ===============================
// UNLOCK
// ===============================
async function unlock() {
  const password = document.getElementById("password").value;

  try {
    const keyId = await decryptData(password, CONFIG.keyIdEnc, CONFIG.salt, CONFIG.iv);
    const appKey = await decryptData(password, CONFIG.appKeyEnc, CONFIG.salt, CONFIG.iv);

    await authorizeB2(keyId, appKey);

    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
  } catch (e) {
    alert("Failed to unlock: " + e);
  }
}

// ===============================
// AUTH
// ===============================
async function authorizeB2(keyId, appKey) {
  const res = await fetch("https://api.backblazeb2.com/b2api/v2/b2_authorize_account", {
    headers: {
      "Authorization": "Basic " + btoa(keyId + ":" + appKey)
    }
  });

  const data = await res.json();

  authToken = data.authorizationToken;
  apiUrl = data.apiUrl;
  bucketId = data.allowed.bucketId;

  console.log("Authorized");
}

// ===============================
// LIST FILES
// ===============================
async function listFiles() {
  const res = await fetch(apiUrl + "/b2api/v2/b2_list_file_names", {
    method: "POST",
    headers: {
      Authorization: authToken,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      bucketId: bucketId,
      maxFileCount: 100
    })
  });

  const data = await res.json();

  const list = document.getElementById("fileList");
  list.innerHTML = "";

  data.files.forEach(file => {
    const li = document.createElement("li");

    const a = document.createElement("a");
    a.textContent = file.fileName;
    a.href = "#";
    a.onclick = () => downloadFile(file.fileName);

    li.appendChild(a);
    list.appendChild(li);
  });
}

// ===============================
// UPLOAD FILE
// ===============================
async function uploadFile() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("No file selected");

  // Get upload URL
  const uploadUrlRes = await fetch(apiUrl + "/b2api/v2/b2_get_upload_url", {
    method: "POST",
    headers: {
      Authorization: authToken,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      bucketId: bucketId
    })
  });

  const uploadData = await uploadUrlRes.json();

  const arrayBuffer = await file.arrayBuffer();

  await fetch(uploadData.uploadUrl, {
    method: "POST",
    headers: {
      Authorization: uploadData.authorizationToken,
      "X-Bz-File-Name": encodeURIComponent(file.name),
      "Content-Type": file.type || "b2/auto",
      "X-Bz-Content-Sha1": "do_not_verify"
    },
    body: arrayBuffer
  });

  alert("Uploaded!");
  listFiles();
}

// ===============================
// DOWNLOAD FILE
// ===============================
async function downloadFile(fileName) {
  const res = await fetch(apiUrl + "/b2api/v2/b2_get_download_url_by_name?bucketName=theSEAT&fileName=" + encodeURIComponent(fileName), {
    headers: { Authorization: authToken }
  });

  const data = await res.json();

  window.open(data.downloadUrl);
}

</script>
</body>
</html>
