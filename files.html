<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>B2 Cloudflare File Manager</title>
</head>
<body>

<h2>B2 File Manager</h2>

<div id="app">
  <button onclick="init()">Connect</button>

  <br><br>

  <input type="file" id="fileInput">
  <button onclick="upload()">Upload</button>

  <h3>Files</h3>
  <button onclick="listFiles()">Refresh</button>
  <ul id="files"></ul>
</div>

<script>

let state = null;

// ------------------- INIT -------------------
async function init() {
  const res = await fetch("/api/auth");
  state = await res.json();
  alert("Connected!");
}

// ------------------- LIST -------------------
async function listFiles() {
  const res = await fetch("/api/files", {
    method: "POST",
    body: JSON.stringify(state)
  });

  const data = await res.json();

  const list = document.getElementById("files");
  list.innerHTML = "";

  data.files.forEach(f => {
    const li = document.createElement("li");
    li.textContent = f.fileName;
    list.appendChild(li);
  });
}

// ------------------- UPLOAD -------------------
async function upload() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return;

  const up = await fetch("/api/upload-url", {
    method: "POST",
    body: JSON.stringify(state)
  });

  const uploadData = await up.json();

  const buffer = await file.arrayBuffer();

  await fetch(uploadData.uploadUrl, {
    method: "POST",
    headers: {
      Authorization: uploadData.authorizationToken,
      "X-Bz-File-Name": encodeURIComponent(file.name),
      "Content-Type": file.type || "b2/auto",
      "X-Bz-Content-Sha1": "do_not_verify"
    },
    body: buffer
  });

  alert("Uploaded!");
  listFiles();
}

</script>

</body>
</html>
