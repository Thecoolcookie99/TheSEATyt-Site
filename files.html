<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2 File Manager</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #111; color: #ddd; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        input, button { padding: 10px; margin: 5px; border-radius: 6px; }
        button { background: #0066ff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0055dd; }
        .file-item { padding: 12px; background: #1f1f1f; margin: 8px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .status { padding: 10px; margin: 10px 0; border-radius: 6px; }
        .success { background: #0a3; color: white; }
        .error { background: #a33; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Backblaze B2 Manager</h1>
        <p>Your domain: <strong>https://theseatyt-site.pages.dev</strong></p>

        <div style="margin:20px 0;">
            <input type="text" id="keyId" placeholder="b2_key_id" style="width:300px;">
            <input type="password" id="appKey" placeholder="b2_app_key">
            <input type="text" id="bucketName" value="theseat" placeholder="Bucket name">
            <button onclick="connect()">Connect</button>
        </div>

        <div>
            <h2>Upload</h2>
            <input type="file" id="fileInput">
            <button onclick="uploadFile()">Upload File</button>
        </div>

        <hr>

        <div>
            <h2>Files in Bucket</h2>
            <button onclick="listFiles()">Refresh List</button>
            <div id="fileList"></div>
        </div>

        <div id="status"></div>
    </div>

    <script>
        let authToken = null;
        let apiUrl = null;
        let bucketId = null;

        async function connect() {
            const keyId = document.getElementById('keyId').value.trim();
            const appKey = document.getElementById('appKey').value.trim();
            const bucketName = document.getElementById('bucketName').value.trim();

            if (!keyId || !appKey) return showStatus("Enter your keys", "error");

            try {
                const auth = btoa(`${keyId}:${appKey}`);
                const res = await fetch('https://api.backblazeb2.com/b2api/v2/b2_authorize_account', {
                    headers: { 'Authorization': `Basic ${auth}` }
                });
                const data = await res.json();
                
                authToken = data.authorizationToken;
                apiUrl = data.apiUrl;

                const bucketRes = await fetch(`${apiUrl}/b2api/v2/b2_list_buckets`, {
                    method: 'POST',
                    headers: { 'Authorization': authToken, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ accountId: data.accountId })
                });
                const buckets = await bucketRes.json();
                bucketId = buckets.buckets.find(b => b.bucketName === bucketName)?.bucketId;

                showStatus("✅ Connected!", "success");
                listFiles();
            } catch (e) {
                showStatus("Connection failed: " + e.message, "error");
            }
        }

        async function uploadFile() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return showStatus("Select a file first", "error");

            showStatus("Uploading...", "");

            try {
                const uploadUrlRes = await fetch(`${apiUrl}/b2api/v2/b2_get_upload_url`, {
                    method: 'POST',
                    headers: { 'Authorization': authToken, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bucketId })
                });
                const uploadInfo = await uploadUrlRes.json();

                const uploadRes = await fetch(uploadInfo.uploadUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': uploadInfo.authorizationToken,
                        'X-Bz-File-Name': encodeURIComponent(file.name),
                        'Content-Type': file.type || 'b2/x-auto',
                        'X-Bz-Content-Sha1': 'do_not_verify'
                    },
                    body: file
                });

                if (uploadRes.ok) {
                    showStatus(`✅ Uploaded ${file.name}`, "success");
                    setTimeout(listFiles, 1500);
                } else {
                    throw new Error("Upload failed");
                }
            } catch (e) {
                showStatus("Upload failed: " + e.message, "error");
            }
        }

        async function listFiles() {
            if (!bucketId) return;
            const res = await fetch(`${apiUrl}/b2api/v2/b2_list_file_names`, {
                method: 'POST',
                headers: { 'Authorization': authToken, 'Content-Type': 'application/json' },
                body: JSON.stringify({ bucketId, maxFileCount: 100 })
            });
            const data = await res.json();

            let html = '';
            data.files.forEach(file => {
                if (file.action === 'folder') return;
                // Use public download URL (works better with web console "Share everything")
                const publicUrl = `https://f000.backblazeb2.com/file/${document.getElementById('bucketName').value}/${encodeURIComponent(file.fileName)}`;
                
                html += `
                    <div class="file-item">
                        <span>${file.fileName} (${(file.contentLength/1024/1024).toFixed(2)} MB)</span>
                        <a href="${publicUrl}" target="_blank" download>
                            <button>Download</button>
                        </a>
                    </div>`;
            });

            document.getElementById('fileList').innerHTML = html || "<p>No files found.</p>";
        }

        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = type ? `status ${type}` : 'status';
        }
    </script>
</body>
</html>
