<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>B2 Upload</title>

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 700px;
  margin: 40px auto;
}

button {
  padding: 10px 20px;
}

#status {
  margin-top: 20px;
  white-space: pre-wrap;
}
</style>

</head>
<body>

<h1>Backblaze Upload</h1>

<input type="file" id="file">
<button id="uploadBtn">
  Upload
</button>

<div id="status"></div>

<script>
const statusEl =
  document.getElementById("status");

function log(msg) {
  statusEl.textContent += msg + "\n";
}

document
  .getElementById("uploadBtn")
  .addEventListener("click", upload);

async function upload() {

  statusEl.textContent = "";

  const file =
    document.getElementById("file")
      .files[0];

  if (!file) {
    alert("Choose a file");
    return;
  }

  try {

    log("Uploading...");

    const formData =
      new FormData();

    formData.append(
      "file",
      file
    );

    const response =
      await fetch(
        "/upload",
        {
          method: "POST",
          body: formData
        }
      );

    const data =
      await response.json();

    if (!response.ok) {
      throw new Error(
        JSON.stringify(data)
      );
    }

    log("Upload complete!");
    log("");
    log("File ID:");
    log(data.fileId);
    log("");
    log("URL:");
    log(data.url);

  } catch (err) {
    log("ERROR:");
    log(err.message);
  }
}
</script>

</body>
</html>
