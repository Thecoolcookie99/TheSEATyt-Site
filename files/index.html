<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>B2 File Manager</title>

<style>
body {
  font-family: Arial;
  max-width: 900px;
  margin: 40px auto;
  background: #0f0f0f;
  color: #eee;
}

.card {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}

input, button {
  padding: 10px;
  margin: 5px 0;
}

button {
  cursor: pointer;
}

.file {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  border-bottom: 1px solid #333;
}

a {
  color: #4da3ff;
  text-decoration: none;
}

small {
  color: #aaa;
}
</style>
</head>

<body>

<h1>📦 Backblaze File Manager</h1>

<div class="card">
  <h3>Upload File</h3>
  <input type="file" id="file">
  <br>
  <button onclick="upload()">Upload</button>
  <p id="uploadStatus"></p>
</div>

<div class="card">
  <h3>Files</h3>
  <button onclick="loadFiles()">Refresh</button>
  <div id="files"></div>
</div>

<script>
const uploadStatus = document.getElementById("uploadStatus");
const filesDiv = document.getElementById("files");

async function upload() {
  const file = document.getElementById("file").files[0];

  if (!file) return alert("Select a file");

  uploadStatus.textContent = "Uploading...";

  const form = new FormData();
  form.append("file", file);

  const res = await fetch("/upload", {
    method: "POST",
    body: form
  });

  const data = await res.json();

  if (!res.ok) {
    uploadStatus.textContent = "Error uploading";
    console.log(data);
    return;
  }

  uploadStatus.textContent = "Uploaded: " + data.url;

  loadFiles();
}

async function loadFiles() {
  filesDiv.innerHTML = "Loading...";

  const res = await fetch("/list");
  const data = await res.json();

  if (!res.ok) {
    filesDiv.innerHTML = "Failed to load files";
    return;
  }

  filesDiv.innerHTML = "";

  data.files.reverse().forEach(file => {
    const div = document.createElement("div");
    div.className = "file";

    div.innerHTML = `
      <div>
        <b>${file.name}</b><br>
        <small>${(file.size / 1024).toFixed(1)} KB</small>
      </div>
      <div>
        <a href="${file.url}" target="_blank">Download</a>
      </div>
    `;

    filesDiv.appendChild(div);
  });
}

loadFiles();
</script>

</body>
</html>
