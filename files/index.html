<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>B2 File Manager</title>

<style>
body {
  font-family: Arial;
  max-width: 900px;
  margin: 40px auto;
}

.card {
  border: 1px solid #ddd;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 10px;
}

.file {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  border-bottom: 1px solid #eee;
}

small { color: #666; }

button { padding: 8px 12px; }
</style>
</head>

<body>

<h1>📦 B2 File Manager</h1>

<div class="card">
  <h3>Upload</h3>
  <input type="file" id="file">
  <button onclick="upload()">Upload</button>
  <p id="status"></p>
</div>

<div class="card">
  <h3>Files</h3>
  <button onclick="loadFiles()">Refresh</button>
  <div id="files"></div>
</div>

<script>
const status = document.getElementById("status");
const filesDiv = document.getElementById("files");

async function upload() {
  const file = document.getElementById("file").files[0];
  if (!file) return alert("Select a file");

  status.textContent = "Uploading...";

  const form = new FormData();
  form.append("file", file);

  const res = await fetch("/upload", {
    method: "POST",
    body: form
  });

  const data = await res.json();

  if (!res.ok) {
    status.textContent = "Upload failed";
    console.log(data);
    return;
  }

  status.textContent = "Uploaded: " + data.fileName;

  loadFiles();
}

async function loadFiles() {
  filesDiv.innerHTML = "Loading...";

  const res = await fetch("/list");
  const data = await res.json();

  if (!res.ok) {
    filesDiv.innerHTML = "Error loading files";
    return;
  }

  filesDiv.innerHTML = "";

  data.files.reverse().forEach(file => {
    const div = document.createElement("div");
    div.className = "file";

    div.innerHTML = `
      <div>
        <b>${file.name}</b><br>
        <small>${(file.size / 1024).toFixed(1)} KB</small>
      </div>
      <div>
        <a href="${file.downloadUrl}" target="_blank">
          Download
        </a>
      </div>
    `;

    filesDiv.appendChild(div);
  });
}

loadFiles();
</script>

</body>
</html>
